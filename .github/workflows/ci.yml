name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check-types

      - name: Unit and contract tests
        run: npm test

      - name: Enforce coverage thresholds
        shell: bash
        run: |
          set -o pipefail
          npm run test:coverage | tee coverage-report.txt

      - name: Build extension
        run: npm run build

      - name: Extension Host integration tests
        run: xvfb-run -a npm run test:integration

      - name: Audit development dependencies
        run: npm audit --audit-level=high

      - name: Package and inspect VSIX
        run: npm run package:verify

      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: git-vscode-${{ github.sha }}
          path: |
            artifacts/vsgit-vscode.vsix
            coverage-report.txt
          retention-days: 7
